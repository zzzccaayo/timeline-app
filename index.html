<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>好友时区时间轴</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="view-loading" class="view full-center">
    <div class="spinner"></div>
  </div>

  <div id="view-auth" class="view full-center" hidden>
    <div class="auth-card">
      <h1 class="brand">好友时区时间轴</h1>
      <p class="sub">看看朋友们都几点在线，方便约局。</p>

      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="login">登录</button>
        <button class="tab" data-tab="register">注册</button>
      </div>

      <form id="loginForm" class="auth-form">
        <label>邮箱<input type="email" name="email" required autocomplete="email" /></label>
        <label>密码<input type="password" name="password" required minlength="6" autocomplete="current-password" /></label>
        <button type="submit">登录</button>
      </form>

      <form id="registerForm" class="auth-form" hidden>
        <label>昵称<input type="text" name="username" required minlength="1" maxlength="24" /></label>
        <label>邮箱<input type="email" name="email" required autocomplete="email" /></label>
        <label>密码<input type="password" name="password" required minlength="6" autocomplete="new-password" /></label>
        <button type="submit">创建账号</button>
      </form>

      <p id="authError" class="error" hidden></p>
    </div>
  </div>

  <div id="view-onboarding" class="view" hidden>
    <div class="container narrow">
      <header class="page-header">
        <h1>欢迎, <span id="obUsername">朋友</span></h1>
        <p class="sub">先设置一下你的时区和每天活跃时段，方便朋友找你。</p>
      </header>

      <section class="panel">
        <div class="friend-code-big">
          你的好友代码
          <div class="code-value" id="obFriendCode">——————</div>
          <p class="hint">把这个代码发给朋友，他们就能加你。</p>
        </div>
      </section>

      <form id="onboardingForm" class="panel form-panel">
        <label>昵称<input type="text" name="username" required minlength="1" maxlength="24" /></label>
        <label>时区<select name="timezone" required></select></label>
        <div class="periods-section">
          <div class="periods-section-head">
            <span>活跃时段</span>
            <button type="button" class="ghost small add-period" data-target="obPeriodsList">+ 添加时段</button>
          </div>
          <div class="periods-list" id="obPeriodsList"></div>
        </div>
        <label>在时间轴上显示的颜色<input type="color" name="color" value="#4f8cff" /></label>
        <p class="hint">活跃时段可跨午夜，例如 22:00 – 02:00；可以加多个时段。</p>
        <p id="onboardingError" class="error" hidden></p>
        <button type="submit">保存并进入</button>
      </form>
    </div>
  </div>

  <div id="view-main" class="view" hidden>
    <header class="topbar">
      <div class="brand-small">时区时间轴</div>
      <div class="topbar-right">
        <span class="me-code">
          <span class="me-name" id="meName"></span>
          <span class="code-pill" id="meCodePill" title="点击复制">
            <span class="code-label">好友代码</span>
            <span id="meCode">——————</span>
          </span>
        </span>
        <button id="openSettings" class="ghost">设置</button>
        <button id="logout" class="ghost">退出</button>
      </div>
    </header>

    <main class="container">
      <section class="panel">
        <div class="timeline-header">
          <div>
            <h2 class="panel-title">我的时间轴</h2>
            <p class="hint" id="selfMeta"></p>
          </div>
          <div class="legend">
            <span class="dot now"></span> 现在
            <span class="sep">·</span>
            <span class="dot overlap"></span> 和好友重合
          </div>
        </div>
        <div id="timeline" class="timeline"></div>
      </section>

      <section class="panel">
        <h2 class="panel-title">共同在线时段</h2>
        <div id="overlapList" class="overlap-list"></div>
      </section>

      <section class="panel">
        <h2 class="panel-title">好友</h2>

        <form id="addFriendForm" class="inline-form">
          <input type="text" id="friendCodeInput" placeholder="输入 6 位好友代码" maxlength="6" autocomplete="off" />
          <button type="submit">添加</button>
        </form>
        <p id="addFriendMsg" class="hint" hidden></p>

        <div id="pendingIn" class="pending-list"></div>
        <div id="pendingOut" class="pending-list"></div>

        <ul id="friendList" class="friends"></ul>
        <p id="friendEmpty" class="hint" hidden>还没有好友，把你的好友代码发给朋友吧。</p>
      </section>
    </main>
  </div>

  <div id="settingsModal" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <h2>编辑个人资料</h2>
        <button class="ghost" id="closeSettings">✕</button>
      </div>
      <form id="settingsForm" class="form-panel">
        <label>昵称<input type="text" name="username" required minlength="1" maxlength="24" /></label>
        <label>时区<select name="timezone" required></select></label>
        <div class="periods-section">
          <div class="periods-section-head">
            <span>活跃时段</span>
            <button type="button" class="ghost small add-period" data-target="settingsPeriodsList">+ 添加时段</button>
          </div>
          <div class="periods-list" id="settingsPeriodsList"></div>
        </div>
        <label>颜色<input type="color" name="color" /></label>
        <p id="settingsError" class="error" hidden></p>
        <button type="submit">保存</button>
      </form>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
